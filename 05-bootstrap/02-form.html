<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <main class="d-flex align-items-center mt-5">
      <form class="ira-form container border rounded bg-white p-4 mx-auto">
        <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>

        <div class="row mb-3">
          <label for="balance" class="col-sm-6 col-form-label"
            >Balance ($)</label
          >
          <div class="col-sm-6">
            <input
              type="text"
              class="form-control"
              id="balance"
              name="balance"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label for="annual-contribution" class="col-sm-6 col-form-label">
            Annual Contribution ($)
          </label>
          <div class="col-sm-6">
            <input
              type="text"
              class="form-control"
              id="annual-contribution"
              name="annual-contribution"
            />
          </div>
        </div>

        <fieldset class="row mb-3">
          <legend class="col-sm-6 col-form-label">
            Maximize contributions?
          </legend>
          <div class="col-sm-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="maximize-yes"
                name="maximize"
                value="yes"
              />
              <label class="form-check-label" for="maximize-yes">Yes</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="maximize-no"
                name="maximize"
                value="no"
              />
              <label class="form-check-label" for="maximize-no">No</label>
            </div>
          </div>
        </fieldset>

        <div class="row mb-3">
          <label for="rate" class="col-sm-6 col-form-label"
            >Expected return (%)</label
          >
          <div class="col-sm-6">
            <input
              type="number"
              class="form-control"
              id="rate"
              name="rate"
              min="0"
              max="100"
              step="0.1"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label for="curr-age" class="col-sm-6 col-form-label"
            >Current age</label
          >
          <div class="col-sm-6">
            <input
              type="number"
              class="form-control"
              id="curr-age"
              name="curr-age"
              min="0"
              max="120"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label for="retirement-age" class="col-sm-6 col-form-label"
            >Retirement age</label
          >
          <div class="col-sm-6">
            <input
              type="number"
              class="form-control"
              id="retirement-age"
              name="retirement-age"
              min="0"
              max="120"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label for="marginal-taxrate" class="col-sm-6 col-form-label"
            >Tax rate (%)</label
          >
          <div class="col-sm-6">
            <input
              type="number"
              class="form-control"
              id="marginal-taxrate"
              name="marginal-taxrate"
              min="0"
              max="100"
              step="0.1"
            />
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary w-100">
              Calculate
            </button>
            <button type="reset" class="btn btn-outline-secondary w-100">
              Reset
            </button>
          </div>
        </div>

        <p class="small">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a
            href="https://www.calculator.net/roth-ira-calculator.html"
            class="text-primary"
          >
            Calculator.net
          </a>
        </p>
      </form>
    </main>
  </body>
</html>
