<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <main>
      <h1>Checkout Form</h1>
      <form>
        <div>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" autocomplete="name" />
        </div>
        <div>
          <label for="address">Address:</label>
          <input
            type="text"
            id="address"
            name="address"
            autocomplete="street-address"
          />
        </div>
        <div>
          <label for="city">City:</label>
          <input
            type="text"
            id="city"
            name="city"
            autocomplete="address-level2"
          />
        </div>
        <div>
          <label for="zip">Zip Code:</label>
          <input
            type="text"
            id="zip"
            name="zip"
            autocomplete="postal-code"
            inputmode="numeric"
          />
        </div>
        <fieldset>
          <legend>Credit Card Type</legend>
          <label> <input type="radio" name="card" value="visa" /> Visa </label>
          <label>
            <input type="radio" name="card" value="mastercard" /> MasterCard
          </label>
          <label>
            <input type="radio" name="card" value="amex" /> American Express
          </label>
        </fieldset>
        <div>
          <label for="cc_number">Credit Card Number:</label>
          <input
            type="text"
            id="cc_number"
            name="cc_number"
            autocomplete="cc-number"
            inputmode="numeric"
          />
        </div>
        <div>
          <label for="cvv">CVC:</label>
          <input
            type="text"
            id="cvv"
            name="cvv"
            autocomplete="cc-csc"
            inputmode="numeric"
          />
        </div>
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
